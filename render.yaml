# Render 部署配置（可选；Render 也能自动识别）
# 访问 https://render.com/docs/node-version 了解字段
services:
  - type: web
    name: prisma-match
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        generateValue: true
      - key: MONGODB_URI
        sync: false   # 部署后在 Render 控制台手动填（建议 MongoDB Atlas 免费 M0）
      - key: MONGODB_DB
        value: prisma-match
    autoDeploy: true
